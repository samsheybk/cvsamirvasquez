<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Samir Vasquez</title>
    <meta name="description" content="Artículos y reflexiones sobre gestión de proyectos, tecnología y liderazgo.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="blog.css">
</head>

<body>
    <div class="blob blog-blob-1"></div>
    <div class="blob blog-blob-2"></div>

    <header>
        <nav>
            <div class="nav-brand">
                <a href="index.html" class="nav-profile-link">
                    <img src="Recursos/Foto%20de%20perfil.jpeg" alt="Samir Vasquez" class="nav-profile-img">
                </a>
                <div class="logo">SV<span>.</span></div>
            </div>
            <button class="hamburger" aria-label="Abrir menú">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <ul class="nav-links">
                <li><a href="index.html">Volver al CV</a></li>
                <li>
                    <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema">☀️</button>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="blog-hero">
            <div class="blog-hero-content reveal">
                <h1 class="blog-title">Blog</h1>
                <p class="blog-subtitle">Artículos sobre gestión de proyectos, tecnología y liderazgo estratégico</p>
            </div>
        </section>

        <section class="blog-posts section">
            <div id="blog-grid" class="blog-grid">
                <!-- Los artículos se cargan dinámicamente desde script.js -->
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Samir Vasquez. Todos los derechos reservados.</p>
    </footer>

    <!-- Download Modal -->
    <div id="download-modal" class="download-modal">
        <div class="download-modal-content">
            <button id="download-close" class="download-close" aria-label="Cerrar">✕</button>
            <h2>📥 Descarga Gratis</h2>
            <p>Completa tus datos para acceder al contenido completo.</p>
            <form id="download-form">
                <div class="form-group">
                    <label for="dl-name">Nombre y Apellido *</label>
                    <input type="text" id="dl-name" required placeholder="Ej: María López">
                </div>
                <div class="form-group">
                    <label for="dl-email">Correo Electrónico *</label>
                    <input type="email" id="dl-email" required placeholder="Ej: maria@correo.com">
                    <span id="dl-email-error" class="field-error"></span>
                </div>
                <div class="form-group">
                    <label for="dl-phone">Teléfono *</label>
                    <input type="tel" id="dl-phone" required placeholder="Ej: 04121234567">
                </div>
                <div class="form-group">
                    <label for="dl-profession">Profesión *</label>
                    <input type="text" id="dl-profession" required placeholder="Ej: Ingeniero">
                </div>
                <button type="submit" class="btn btn-primary btn-large download-submit" disabled>Descargar
                    Archivo</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
