        </section>
    </main>

    <!-- Download Modal -->
    <div id="download-modal" class="download-modal">
        <div class="download-modal-content">
            <button id="download-close" class="download-close" aria-label="Cerrar">✕</button>
            <h2>📥 Descarga Gratis</h2>
            <p>Completa tus datos para acceder al contenido completo.</p>
            <form id="download-form">
                <div class="form-group">
                    <label for="dl-name">Nombre y Apellido *</label>
                    <input type="text" id="dl-name" required placeholder="Ej: María López">
                </div>
                <div class="form-group">
                    <label for="dl-email">Correo Electrónico *</label>
                    <input type="email" id="dl-email" required placeholder="Ej: maria@correo.com">
                    <span id="dl-email-error" class="field-error"></span>
                </div>
                <div class="form-group">
                    <label for="dl-phone">Teléfono *</label>
                    <input type="tel" id="dl-phone" required placeholder="Ej: 04121234567">
                </div>
                <div class="form-group">
                    <label for="dl-profession">Profesión *</label>
                    <input type="text" id="dl-profession" required placeholder="Ej: Ingeniero">
                </div>
                <button type="submit" class="btn btn-primary btn-large download-submit" disabled>Descargar
                    Archivo</button>
            </form>
        </div>
    </div>

    <!-- WhatsApp Chat Button -->
    <button id="whatsapp-chat-btn" class="whatsapp-float" aria-label="Chatear por WhatsApp">
        <svg viewBox="0 0 32 32" width="35" height="35" fill="currentColor">
            <path d="M16 2.5a13.4 13.4 0 0 0-11.6 20l-1.9 6.8 7-1.8A13.4 13.4 0 1 0 16 2.5zm7.3 19.3c-.3 1-1.8 1.8-2.6 1.9-1.3.2-3.1-.3-5.7-1.4a15 15 0 0 1-6.1-5.3 6.3 6.3 0 0 1-1.3-3.4 3.5 3.5 0 0 1 1.1-2.5c.3-.3.7-.4 1-.4h.3c.3 0 .6-.1.8.4.3.7.8 2 1 2.2.1.2.1.5 0 .7s-.2.4-.4.6c-.2.2-.4.4-.5.6s-.3.4-.1.7c.3.5 1.2 2 2.6 3.1 1.7 1.4 3 1.8 3.5 2 .5.1.7.1 1-.1s1.1-1.3 1.4-1.7.5-.3.8-.2l2.3 1.1c.3.2.5.3.6.4.1.3.1.8-.2 1.8z" />
        </svg>
    </button>

    <!-- WhatsApp Chat Modal -->
    <div id="whatsapp-chat-modal" class="whatsapp-chat-modal">
        <div class="whatsapp-chat-content">
            <div class="whatsapp-chat-header">
                <span>💬 Chatear por WhatsApp</span>
                <button id="whatsapp-chat-close" class="whatsapp-chat-close" aria-label="Cerrar">✕</button>
            </div>
            <form id="whatsapp-chat-form" class="whatsapp-chat-form">
                <div class="chat-form-group">
                    <label for="chat-name">Nombre y Apellido *</label>
                    <input type="text" id="chat-name" required placeholder="Ej: Carlos Pérez">
                </div>
                <div class="chat-form-group">
                    <label for="chat-phone">Teléfono WhatsApp *</label>
                    <input type="tel" id="chat-phone" required placeholder="Ej: 584121234567">
                </div>
                <div class="chat-form-group">
                    <label for="chat-message">Mensaje *</label>
                    <textarea id="chat-message" rows="2" required placeholder="Escribe tu mensaje..."></textarea>
                </div>
                <button type="submit" class="btn btn-primary chat-submit">Enviar por WhatsApp</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
