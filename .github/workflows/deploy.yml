name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create config.js from Secrets
        run: |
          echo "// Archivo generado automáticamente por GitHub Actions" > config.js
          echo "const SUPABASE_URL = '${{ secrets.SUPABASE_URL }}';" >> config.js
          echo "const SUPABASE_ANON_KEY = '${{ secrets.SUPABASE_KEY }}';" >> config.js
          echo "console.log('Configuración de Supabase cargada desde Secrets');" >> config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
